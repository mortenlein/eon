<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Analysis Board — Eon</title>
    <link rel="stylesheet" href="/hud/css/vars.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            color: #fff;
        }
        #app {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        .analysis-container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        /* Full screen radar config */
        .radar-container {
            position: absolute;
            inset: 0;
            background: #080808;
        }
        .drawing-layer {
            position: absolute;
            inset: 0;
            z-index: 100;
            cursor: crosshair;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        .controls {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 1.5rem;
            background: rgba(18, 18, 18, 0.9);
            padding: 0.75rem 1.5rem;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            z-index: 1000;
            opacity: 0.3;
            transition: opacity 0.3s;
        }
        .controls:hover {
            opacity: 1;
        }

        .drawing-palette {
            display: flex;
            gap: 0.5rem;
            padding-right: 1.5rem;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .drawing-sizes {
            display: flex;
            gap: 0.25rem;
            padding-right: 1.5rem;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-size {
            background: transparent;
            border: 1px solid transparent;
            color: rgba(255, 255, 255, 0.5);
            padding: 0.35rem 0.75rem;
            border-radius: 999px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.75rem;
            transition: all 0.2s;
        }

        .btn-size:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        .btn-size.--active {
            background: rgba(255, 255, 255, 0.1);
            color: #ff5a00;
            border-color: rgba(255, 90, 0, 0.2);
        }

        .btn-clear {
            background: rgba(240, 49, 37, 0.1);
            border: 1px solid rgba(240, 49, 37, 0.2);
            color: #ff8b8b;
            padding: 0.5rem 1.25rem;
            border-radius: 999px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.8rem;
            margin-left: 0.5rem;
        }

        .btn-clear:hover {
            background: rgba(240, 49, 37, 0.2);
        }

        .color-dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .color-dot:hover {
            transform: scale(1.2);
        }
        .color-dot.--active {
            border-color: #fff;
            transform: scale(1.2);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script type="module" src="/config/analysis.js"></script>
</body>
</html>
