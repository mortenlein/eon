<SvgFilters />
<div v-if="$map.name" class="hud-stage">
	<Sponsors />
	<Radar />
	<TopBar />
	<PlayersAlive />

	<div v-if="showObserverDataWarning" class="observer-warning">
		<div class="observer-warning__title">Observer data unavailable</div>
		<div class="observer-warning__copy">CS2 is connected, but full spectator `allplayers` data is not being sent yet.</div>
	</div>

	<Sidebars />
	<FocusedPlayer />

	<SeriesGraph />
	<Telestrator />
</div>

<template v-else>
	<Corners />

	<div class="standby">
		<div class="standby-card">
			<div class="standby-eyebrow">Eon</div>
			<div class="standby-title">Waiting For Counter-Strike Game State</div>
			<div class="standby-copy">The HUD server is running, but no live spectator map data has been received yet.</div>
			<div class="standby-copy">Open CS2, load the GSI config, then spectate a match, GOTV, or demo.</div>
		</div>
	</div>
</template>
