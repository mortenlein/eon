<div :class="['additional-stats', positionClass]">
	<div class="additional-stats-inner">
		<div class="stat">
			<div class="label">K</div>
			<div class="value">{{ player.kills || 0 }}</div>
		</div>
		<div class="stat">
			<div class="label">D</div>
			<div class="value">{{ player.deaths || 0 }}</div>
		</div>
		<div class="stat">
			<div class="label">A</div>
			<div class="value">{{ player.assists || 0 }}</div>
		</div>
		<div class="stat">
			<div class="label">ADR</div>
			<div class="value">{{ player.adr || 0 }}</div>
		</div>
	</div>
</div>
